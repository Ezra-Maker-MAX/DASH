<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蜜欲老虎机 🌸 </title>
    <style>
        body {
            margin:0; padding:0;
            background: linear-gradient(135deg, #2a0033, #4a004d, #6b1a5e);
            color: #ff99cc;
            font-family: system-ui, -apple-system, 'Noto Sans SC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .machine {
            background: rgba(0,0,0,0.88);
            border: 8px solid #ff69b4;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 0 70px #ff69b4, inset 0 0 50px #ff99cc;
            width: 92%; max-width: 860px;
            text-align: center;
        }
        h1 { 
            font-size: 2.7em; 
            margin: 10px 0; 
            color: #ffb6c1;
            text-shadow: 0 0 25px #ff69b4;
        }
        .reels {
            display: flex; justify-content: center; gap: 20px; margin: 30px 0;
            background: #1a001f; padding: 25px; border-radius: 18px; border: 4px solid #ff99cc;
        }
        .reel {
            width: 130px; height: 170px; background: #2a002f; border: 4px solid #ff69b4;
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            font-size: 5.2em; box-shadow: inset 0 0 30px rgba(255,105,180,0.6);
        }
        .reel.spinning { animation: spin 0.8s linear infinite; }
        @keyframes spin { 0%{transform:translateY(0)} 100%{transform:translateY(-230%)} }
        
        .controls { display:flex; flex-wrap:wrap; justify-content:center; gap:18px; margin:25px 0; }
        button {
            background: linear-gradient(#ff69b4, #db2777);
            color: white; border: none; padding: 16px 34px;
            font-size: 1.3em; border-radius: 50px; cursor: pointer;
            box-shadow: 0 6px 25px rgba(255,105,180,0.5);
        }
        button:hover { transform: scale(1.06); }
        
        .bet { display:flex; align-items:center; gap:12px; color:#ffccdd; font-size:1.1em; }
        input { background:#3a003f; border:2px solid #ff99cc; color:white; padding:12px; width:90px; text-align:center; border-radius:12px; }
        
        .stats { display:flex; justify-content:space-around; background:rgba(255,105,180,0.15); padding:18px; border-radius:16px; margin:20px 0; color:#ffccdd; }
        
        .win-message {
            min-height: 170px; font-size: 1.45em; padding: 22px;
            background: rgba(0,0,0,0.8); border-radius: 16px; margin: 20px 0;
            border: 3px solid #ff99cc; line-height: 1.55; color: #ffe4e9;
        }
        .description {
            margin-top: 18px; padding: 20px; background: rgba(255,105,180,0.12);
            border-radius: 14px; font-size: 1.2em; line-height: 1.65; color: #ffc2d6;
            min-height: 110px; border-left: 5px solid #ff69b4;
        }
    </style>
</head>
<body>
    <div class="machine">
        <h1>🌸 蜜欲老虎机 🌸</h1>
        <p style="color:#ff99cc; margin-bottom:20px;">享受愉悦 · 每一次转动都是一场甜蜜沉沦</p>
        
        <div class="stats">
            <div>蜜欲值: <span id="balance">5000</span></div>
            <div>投注: <span id="currentBet">100</span></div>
            <div>连胜: <span id="streak">0</span></div>
        </div>
        
        <div class="reels" id="reels">
            <div class="reel" id="reel1">🌹</div>
            <div class="reel" id="reel2">💖</div>
            <div class="reel" id="reel3">🍑</div>
        </div>
        
        <div class="controls">
            <div class="bet">
                <label>投注：</label>
                <input type="number" id="betInput" value="100" min="50" step="50">
                <button onclick="changeBet(-50)">-50</button>
                <button onclick="changeBet(50)">+50</button>
            </div>
            <button onclick="spin()" id="spinBtn" style="padding:20px 70px; font-size:1.5em;">🌸 开始转动 🌸</button>
            <button onclick="autoSpinToggle()" id="autoBtn">自动连转</button>
        </div>
        
        <div class="win-message" id="winMessage">轻轻转动它，让甜蜜的快感涌遍全身...</div>
        <div class="description" id="description">这里·专属于你的浪漫与激烈幻想...</div>
    </div>

    <script>
        // 女性向描述库
        const descriptions = [
            "他温柔地吻遍你的全身，从锁骨慢慢向下，直到你忍不住轻轻颤抖...",
            "你在他的怀里被紧紧抱住，他从身后进入，节奏由慢到快，让你一次次攀上高峰。",
            "烛光晚餐后，他把你抱到床上，用舌尖细致地侍奉，直到你弓起身子尖叫出来。",
            "浴室里热水淋在你们身上，他把你抵在墙上，湿滑又有力的进入让你腿软。",
            "他让你坐在书桌上，双腿缠住他的腰，激烈到书本都掉落在地。",
            "星空下的露台，他从正面深深进入，一边吻你一边低声说爱你...",
            "他让你跨坐在他身上，你掌控着节奏，慢慢磨蹭到最敏感的地方。",
            "丝绸床单上，他把你的双手按在头顶，强势却温柔地占有你。",
            "按摩结束后，他突然从背后抱住你，在你耳边低语着最羞耻的话...",
            "海边别墅，他把你放在飘窗上，海浪声伴随着你越来越高的呻吟。"
        ];
        
        const intenseDescriptions = [
            "高潮来临！你全身绷紧，热流涌出，忍不住抱紧他尖叫着颤抖...",
            "他猛烈撞击着最深处，你感觉自己快要融化了，一波又一波快感袭来。",
            "他在你耳边说『宝贝，叫大声点』，你彻底失控地达到了巅峰。",
            "骑在他身上疯狂扭动，你掌控着一切，快感如潮水般将你淹没。",
            "他用手指和唇舌同时侍奉，你弓起身子，连续高潮到几乎昏厥。"
        ];
        
        const symbols = ['🌹','💖','🍑','🔥','💦','🌸','👄','💋','🫦','✨'];
        
        let balance = 5000, bet = 100, isSpinning = false, autoSpinning = false, streak = 0;
        let audioContext;
        
        const reels = [document.getElementById('reel1'), document.getElementById('reel2'), document.getElementById('reel3')];
        const winMsg = document.getElementById('winMessage');
        const descEl = document.getElementById('description');
        
        function initAudio() {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        function playSound(type) {
            initAudio();
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain); gain.connect(audioContext.destination);
            switch(type) {
                case 'spin': osc.type='sine'; osc.frequency.value=120; gain.gain.value=0.2; osc.start(); setTimeout(()=>osc.stop(),220); break;
                case 'stop': osc.type='triangle'; osc.frequency.value=650; gain.gain.value=0.3; osc.start(); setTimeout(()=>osc.stop(),150); break;
                case 'win': osc.type='sine'; osc.frequency.setValueAtTime(600,audioContext.currentTime); osc.frequency.linearRampToValueAtTime(1100,audioContext.currentTime+0.8); gain.gain.value=0.45; osc.start(); setTimeout(()=>osc.stop(),800); break;
                case 'bigwin': osc.type='sine'; osc.frequency.setValueAtTime(400,audioContext.currentTime); osc.frequency.linearRampToValueAtTime(1400,audioContext.currentTime+1.4); gain.gain.value=0.6; osc.start(); setTimeout(()=>osc.stop(),1500); break;
            }
        }
        
        function vibrate(pattern) { if (navigator.vibrate) navigator.vibrate(pattern); }
        
        function getRandomSymbol() { return symbols[Math.floor(Math.random() * symbols.length)]; }
        
        function spin() {
            if (isSpinning || balance < bet) return;
            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;
            
            balance -= bet;
            document.getElementById('balance').textContent = balance;
            
            playSound('spin'); vibrate(70);
            reels.forEach(r => r.classList.add('spinning'));
            
            setTimeout(() => {
                const results = [getRandomSymbol(), getRandomSymbol(), getRandomSymbol()];
                reels.forEach((reel, i) => reel.textContent = results[i]);
                reels.forEach(r => r.classList.remove('spinning'));
                
                playSound('stop'); vibrate(50);
                checkWin(results);
                
                isSpinning = false;
                document.getElementById('spinBtn').disabled = false;
            }, 1650);
        }
        
        function checkWin(results) {
            let multiplier = 1;
            let baseMsg = '甜蜜的快感正在涌来...';
            let isBigWin = false;
            
            const allSame = results[0] === results[1] && results[1] === results[2];
            
            if (allSame) {
                if (['🔥','💦'].includes(results[0])) {
                    multiplier = 26;
                    baseMsg = `🌊 极致高潮来临！你彻底融化了 💦`;
                    isBigWin = true;
                    playSound('bigwin'); vibrate([300,100,400]);
                } else {
                    multiplier = 12;
                    baseMsg = `💖 甜蜜连击！快感层层叠加`;
                    playSound('win'); vibrate(280);
                }
            } else if (results.filter(s => ['🔥','💦','👄'].includes(s)).length >= 2) {
                multiplier = 6;
                baseMsg = `身体开始发烫...`;
                playSound('win'); vibrate(160);
            } else if (results[0] === results[1] || results[1] === results[2]) {
                multiplier = 3;
                baseMsg = `舒服的电流窜过全身...`;
                playSound('win'); vibrate(100);
            } else {
                multiplier = 0;
                streak = Math.max(0, streak - 1);
            }
            
            const winnings = bet * multiplier;
            balance += winnings;
            if (winnings > 0) streak++;
            
            document.getElementById('balance').textContent = balance;
            document.getElementById('streak').textContent = streak;
            document.getElementById('currentBet').textContent = bet;
            
            winMsg.innerHTML = `${baseMsg}<br><span style="color:#ffccdd">获得 ${winnings} 蜜欲值</span>`;
            
            // 显示女性向详细描述
            const descPool = isBigWin || multiplier >= 12 ? intenseDescriptions : descriptions;
            descEl.textContent = descPool[Math.floor(Math.random() * descPool.length)];
        }
        
        function changeBet(delta) {
            bet = Math.max(50, bet + delta);
            document.getElementById('betInput').value = bet;
        }
        
        document.getElementById('betInput').addEventListener('change', e => {
            bet = Math.max(50, parseInt(e.target.value) || 100);
        });
        
        let autoInterval = null;
        function autoSpinToggle() {
            autoSpinning = !autoSpinning;
            const btn = document.getElementById('autoBtn');
            if (autoSpinning) {
                btn.textContent = '停止自动';
                btn.style.background = '#c026d3';
                autoInterval = setInterval(() => {
                    if (!isSpinning && balance >= bet) spin();
                    else if (balance < bet) stopAuto();
                }, 2800);
            } else stopAuto();
        }
        function stopAuto() {
            autoSpinning = false;
            const btn = document.getElementById('autoBtn');
            btn.textContent = '自动连转';
            btn.style.background = '';
            if (autoInterval) clearInterval(autoInterval);
        }
        
        // 初始化
        document.getElementById('currentBet').textContent = bet;
        document.getElementById('balance').textContent = balance;
        document.getElementById('streak').textContent = streak;
        descEl.textContent = "轻轻一转，属于你的甜蜜幻想就会展开...";
    </script>
</body>
</html>
